<!DOCTYPE html>
<html>
<head>
<title>Admin Orders</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold mb-6">All Orders</h1>

<div id="orders"></div>

<script>

const token = localStorage.getItem("token");

// ❌ If not logged in
if (!token) {
  window.location.href = "login.html";
}

// ✅ Decode token
const payload = JSON.parse(atob(token.split('.')[1]));

// ❌ If not admin
if (payload.role !== "admin") {
  alert("Access denied");
  window.location.href = "index.html";
}

async function loadOrders(){

try {

const res = await fetch("https://choco-backend-thzl.onrender.com/api/orders", {
  headers: {
    "Authorization": token   // ✅ IMPORTANT
  }
});

const orders = await res.json();

let html = "";

orders.forEach(order => {

html += `
<div class="bg-white p-4 rounded shadow mb-4">

<p><b>Name:</b> ${order.name}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Address:</b> ${order.address}</p>

<p class="mt-2 font-semibold">Items:</p>

<ul class="ml-4">
${order.items.map(item => `<li>${item.name} x ${item.quantity}</li>`).join("")}
</ul>

<p class="mt-2 font-bold">Total: ₹${order.total}</p>

</div>
`;

});

document.getElementById("orders").innerHTML = html;

} catch (err) {
  console.error(err);
  alert("Failed to load orders");
}

}

loadOrders();

</script>

</body>
</html>
