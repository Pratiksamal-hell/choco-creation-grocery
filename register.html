<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-80">

<h2 class="text-2xl font-bold mb-4 text-center">Create Account</h2>

<input id="name" type="text" placeholder="Full Name"
class="w-full border p-2 mb-3 rounded">

<input id="email" type="email" placeholder="Email"
class="w-full border p-2 mb-3 rounded">

<input id="password" type="password" placeholder="Password"
class="w-full border p-2 mb-4 rounded">

<button onclick="register()"
class="bg-green-500 text-white w-full py-2 rounded">
Register
</button>

<p class="text-center mt-4 text-sm">
Already have account?
<a href="login.html" class="text-green-600 font-semibold">Login</a>
</p>

<p id="msg" class="text-center mt-2 text-red-500"></p>

</div>

<script>

async function register(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(!name || !email || !password){
document.getElementById("msg").innerText = "Fill all fields";
return;
}

const res = await fetch("https://choco-backend-thzl.onrender.com/api/auth/register", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ name, email, password })
});

const data = await res.json();

if(res.ok){
alert("Registered successfully!");
window.location.href = "login.html";
}
else{
document.getElementById("msg").innerText = data.message;
}

}

</script>

</body>
</html>
