<!DOCTYPE html>
<html>
<head>
<title>Shopping Cart</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 md:p-10"> 

<h1 class="text-2xl font-bold mb-6 text-center">
🛒 Shopping Cart
</h1>

<button onclick="clearCart()" class="bg-red-600 text-white px-4 py-2 rounded mb-4">
Clear Cart
</button>

<div id="cartItems" class="space-y-4"></div>
<h2 id="cartTotal" class="text-2xl font-bold mt-6 text-center"></h2>

<div class="fixed bottom-0 left-0 w-full bg-white p-4 shadow-lg">

<div class="fixed bottom-0 left-0 w-full bg-white border-t shadow-lg p-4">

<div class="flex justify-between items-center">

<button onclick="goToCheckout()"
class="bg-green-500 text-white px-6 py-3 rounded-lg font-semibold">

                        Proceed to Checkout

</button>

</div>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartItems");

function loadCart(){

container.innerHTML="";

let total = 0;

cart.forEach((item,index)=>{

const div=document.createElement("div");

div.className="bg-white p-4 rounded shadow flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4";

div.innerHTML = `

<div class="flex items-center gap-4 w-full">

<img src="${item.image}" class="w-16 h-16 rounded-lg object-cover">

<div class="flex-1">

<h2 class="font-semibold text-lg">${item.name}</h2>

<p class="text-green-600 font-bold">₹${item.price}</p>

<div class="flex items-center gap-3 mt-2">

<button onclick="decreaseQty(${index})"
class="bg-gray-200 px-3 py-1 rounded text-lg">-</button>

<span class="font-medium">${item.quantity}</span>

<button onclick="increaseQty(${index})"
class="bg-gray-200 px-3 py-1 rounded text-lg">+</button>

</div>

</div>

<button onclick="removeItem(${index})"
class="bg-red-500 text-white px-4 py-2 rounded-lg">
Remove
</button>

</div>

`;

container.appendChild(div);

let price = 0;

if(item.price){
price = parseInt(item.price.replace(/[^\d]/g, ""));
}

if(!isNaN(price)){
total += item.price * item.quantity;
}

});

document.getElementById("cartTotal").innerText = "Total: ₹" + total;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

loadCart();

}
function clearCart(){

localStorage.removeItem("cart");

location.reload();

}

loadCart();

function increaseQty(index){

cart[index].quantity += 1;

localStorage.setItem("cart",JSON.stringify(cart));

loadCart();

}

function decreaseQty(index){

if(cart[index].quantity > 1){
cart[index].quantity -= 1;
}
else{
cart.splice(index,1);
}

localStorage.setItem("cart",JSON.stringify(cart));

loadCart();

}
function goToCheckout(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

if(cart.length === 0){
alert("Your cart is empty!");
return;
}

window.location.href = "checkout.html";

}

</script>

</body>
</html>
