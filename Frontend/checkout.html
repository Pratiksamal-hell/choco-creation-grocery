<!DOCTYPE html>
<html>
<head>
<title>Checkout - Choco Creation</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<h1 class="text-3xl font-bold mb-6">Checkout</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-10">

<!-- CART SUMMARY -->
<div class="bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">Order Summary</h2>

<div id="checkoutItems"></div>

<hr class="my-4">

<p id="totalItems" class="text-lg font-semibold"></p>
<p id="itemsTotal" class="text-lg"></p>
<p id="deliveryCharge" class="text-lg"></p>

<h2 id="grandTotal" class="text-2xl font-bold"></h2>

</div>

<!-- CUSTOMER DETAILS -->
<form id="orderForm" class="bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">Customer Details</h2>

<input id="name" type="text" placeholder="Full Name"
class="w-full border p-2 mb-3 rounded" required>

<input id="phone"
type="tel"
placeholder="Phone Number"
maxlength="10"
class="w-full border p-2 mb-3 rounded"
required>

<textarea id="address" placeholder="Delivery Address"
class="w-full border p-2 mb-3 rounded" required></textarea>

<select class="w-full border p-2 mb-4 rounded">
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Paytm</option>
<option>Google Pay</option>
</select>

<button type="submit"
class="bg-green-500 text-white px-6 py-3 rounded w-full">
Place Order
</button>

</form>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Redirect if cart empty
if(cart.length === 0){
alert("Your cart is empty!");
window.location.href="cart.html";
}

const container = document.getElementById("checkoutItems");

let total = 0;

// Display items
cart.forEach(item=>{

const div=document.createElement("div");

div.className="flex justify-between mb-2";

div.innerHTML=`
<span>${item.name} x ${item.quantity || 1}</span>
<span>₹${item.price}</span>
`;

container.appendChild(div);

// FIXED TOTAL CALCULATION
let price = parseInt(item.price.toString().replace(/[^\d]/g, "")) || 0;
total += price * (item.quantity || 1);

});

let delivery = 20;
let grandTotal = total + delivery;

document.getElementById("totalItems").innerText = "Items: " + cart.length;
document.getElementById("itemsTotal").innerText = "Items Total: ₹" + total;
document.getElementById("deliveryCharge").innerText = "Delivery Charge: ₹" + delivery;
document.getElementById("grandTotal").innerText = "Grand Total: ₹" + grandTotal;

// ORDER SUBMIT
document.getElementById("orderForm").addEventListener("submit",function(e){

e.preventDefault();

let cart = JSON.parse(localStorage.getItem("cart")) || [];

if(cart.length === 0){
alert("Your cart is empty!");
return;
}

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

// Clean phone
phone = phone.replace(/\D/g,"");

// Validation
if(phone.length !== 10){
alert("Please enter a valid 10 digit phone number");
return;
}

if(name === "" || phone === "" || address === ""){
alert("Please fill all delivery details!");
return;
}

// SEND ORDER TO BACKEND
fetch("https://choco-backend-thzl.onrender.com/api/orders", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    name: name,
    phone: phone,
    address: address,
    items: cart,
    total: grandTotal
  })
})
.then(res => res.json())
.then(data => {

  alert("Order Placed Successfully!");

  // OPTIONAL: WhatsApp auto message
  let text = `New Order

Name: ${name}
Phone: ${phone}
Address: ${address}

Total: ₹${grandTotal}`;

  let url = "https://wa.me/917978305413?text=" + encodeURIComponent(text);
  window.open(url, "_blank");

  localStorage.removeItem("cart");

  window.location.href="order-success.html";
})
.catch(err => {
  console.error(err);
  alert("Failed to place order");
});

});

// Phone input restriction
document.getElementById("phone").addEventListener("input", function(){

let value = this.value.replace(/\D/g,"");
this.value = value.substring(0,10);

});

</script>

</body>
</html>
